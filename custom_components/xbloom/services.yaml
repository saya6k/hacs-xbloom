execute_recipe:
  name: Execute recipe
  description: >-
    Run a saved XBloom recipe, optionally overriding the grind size and/or
    grinder RPM for this brew only (coffee grinding recipes only; ignored for
    tea / no-grind recipes). Selecting a recipe also syncs the Grind Size and
    Grinder RPM number entities to it.
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine(s) to brew on. Defaults to all configured machines.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    recipe_name:
      name: Recipe name
      description: >-
        Name of the saved recipe to run. Defaults to the currently selected
        recipe if omitted.
      required: false
      example: Morning V60
      selector:
        text:
    grind_size:
      name: Grind size
      description: >-
        Override the grind size (0 = finest, 80 = coarsest) for this brew only.
      required: false
      example: 42
      selector:
        number:
          min: 1
          max: 80
          step: 1
          mode: slider
    rpm:
      name: Grinder RPM
      description: Override the grinder RPM for this brew only.
      required: false
      example: 90
      selector:
        number:
          min: 60
          max: 120
          step: 10
          mode: slider
    bypass_volume:
      name: Bypass volume
      description: >-
        Bypass water volume in ml added after the pours (0 = bypass off). Can
        be added even if the recipe has no bypass. Coffee recipes only.
      required: false
      example: 50
      selector:
        number:
          min: 0
          max: 200
          step: 5
          unit_of_measurement: mL
          mode: slider
    bypass_temperature:
      name: Bypass temperature
      description: >-
        Bypass water temperature in °C (0 = bypass off). Pair with a non-zero
        bypass volume. Coffee recipes only.
      required: false
      example: 90
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "°C"
          mode: slider

cloud_import_recipe:
  name: Import recipe from XBloom cloud
  description: >-
    Fetch a recipe from an XBloom cloud share URL or id and save it as a
    local recipe. No XBloom account login is required — this uses XBloom's
    public share endpoint, the same one the "Share" button in the official
    app produces a link for.
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine(s) to import the recipe into. Defaults to all
        configured machines.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    share_url:
      name: Share URL
      description: >-
        A share-h5.xbloom.com link, e.g. from the official app's Share
        button. Provide this or recipe_id, not both.
      required: false
      example: "https://share-h5.xbloom.com/?id=KmMzhYCe5itq%2FJcqOLhiag%3D%3D"
      selector:
        text:
    recipe_id:
      name: Recipe ID
      description: >-
        The bare share id (the base64 value after ?id= in a share URL).
        Provide this or share_url, not both.
      required: false
      selector:
        text:

cloud_search_recipes:
  name: Search XBloom cloud recipes
  description: >-
    List every recipe saved on the configured XBloom cloud account,
    optionally filtered by name. Requires an XBloom account to be
    configured for the machine (Settings → Devices & Services → XBloom →
    Configure).
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine whose configured cloud account to search.
        Defaults to the first configured machine.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    query:
      name: Query
      description: >-
        Filter results to recipes whose name contains this text
        (case-insensitive). Omit to list every recipe.
      required: false
      example: Morning
      selector:
        text:

cloud_create_recipe:
  name: Create XBloom cloud recipe
  description: >-
    Create a new recipe on the configured XBloom cloud account (visible in
    the official app), either from an inline YAML recipe definition or by
    pushing an existing local recipe by name. Provide recipe_yaml or
    recipe_name, not both. Returns the new recipe's table ID and share
    URL. Requires an XBloom account to be configured for the machine
    (Settings → Devices & Services → XBloom → Configure).
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine whose configured cloud account to create the
        recipe on. Defaults to the first configured machine.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    recipe_yaml:
      name: Recipe (YAML)
      description: >-
        The recipe definition in the same YAML format used by the local
        "Add a recipe" options-flow step (name, grind_size, rpm, dose_g,
        ratio, cup_type, bypass_volume, bypass_temperature, pours). Provide
        this or recipe_name, not both.
      required: false
      selector:
        text:
          multiline: true
    recipe_name:
      name: Recipe name (push an existing local recipe)
      description: >-
        Name of an existing local (default, YAML, or UI-managed) recipe to
        push to the cloud instead of defining one inline. Provide this or
        recipe_yaml, not both.
      required: false
      example: Morning V60
      selector:
        text:

cloud_edit_recipe:
  name: Edit XBloom cloud recipe
  description: >-
    Change one or more fields of an existing recipe on the configured
    XBloom cloud account. Only the fields present in the YAML are changed
    — every omitted field keeps its current value on the account (fetches
    the current recipe first, then patches). Requires an XBloom account to
    be configured for the machine (Settings → Devices & Services → XBloom
    → Configure).
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine whose configured cloud account to edit the
        recipe on. Defaults to the first configured machine.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    table_id:
      name: Recipe table ID
      description: >-
        The cloud recipe's table ID, from cloud_search_recipes or
        cloud_create_recipe's response.
      required: true
      example: 12345
      selector:
        number:
          min: 1
          mode: box
    recipe_yaml:
      name: Fields to change (YAML)
      description: >-
        A YAML mapping of only the fields to change, using the same field
        names as "Add a recipe" (e.g. just `name: New Name` to rename).
        Omitted fields are left unchanged.
      required: true
      example: "name: New Name"
      selector:
        text:
          multiline: true

cloud_delete_recipe:
  name: Delete XBloom cloud recipe
  description: >-
    Permanently delete a recipe from the configured XBloom cloud account.
    This cannot be undone. Requires an XBloom account to be configured for
    the machine (Settings → Devices & Services → XBloom → Configure).
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine whose configured cloud account to delete the
        recipe from. Defaults to the first configured machine.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    table_id:
      name: Recipe table ID
      description: >-
        The cloud recipe's table ID, from cloud_search_recipes or
        cloud_create_recipe's response.
      required: true
      example: 12345
      selector:
        number:
          min: 1
          mode: box
