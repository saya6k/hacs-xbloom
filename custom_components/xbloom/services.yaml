create_recipe:
  name: Create recipe
  description: >-
    Create a new local recipe from an inline YAML definition. It appears
    in the Recipe dropdown immediately and gets a local uid (returned in
    the response). To publish it to the XBloom cloud afterwards, call
    cloud_export_recipe.
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine to create the recipe on. Defaults to the first
        configured machine.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    recipe_yaml:
      name: Recipe (YAML)
      description: >-
        The recipe definition in the same YAML format used by the local
        "Add a recipe" options-flow step (name, grind_size, rpm, dose_g,
        ratio, cup_type, bypass_volume, bypass_temperature, pours).
      required: true
      selector:
        text:
          multiline: true

edit_recipe:
  name: Edit recipe
  description: >-
    Change one or more fields of a local recipe. Only the fields present
    in the YAML are changed — every omitted field keeps its current value.
    Cloud recipes cannot be edited directly: pointing this at a share URL
    that isn't local yet first imports a local copy (with its own uid) and
    edits that, leaving only the edited local version.
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine whose recipe to edit. Defaults to the first
        configured machine.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    recipe:
      name: Recipe
      description: >-
        Which recipe to edit — a local uid, a cloud table id, a share
        URL/id, or the exact recipe name.
      required: true
      example: Morning V60
      selector:
        text:
    changes:
      name: Fields to change (YAML)
      description: >-
        A YAML mapping of only the fields to change, using the same field
        names as "Add a recipe" (e.g. just `name: New Name` to rename).
        Omitted fields are left unchanged.
      required: true
      example: "grind_size: 55"
      selector:
        text:
          multiline: true

delete_recipe:
  name: Delete recipe
  description: >-
    Delete a local recipe. It disappears from the Recipe dropdown
    immediately. A copy on the XBloom cloud account (if any) is NOT
    touched — manage cloud copies from the official app.
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine whose recipe to delete. Defaults to the first
        configured machine.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    recipe:
      name: Recipe
      description: >-
        Which recipe to delete — a local uid, a cloud table id, a share
        URL/id, or the exact recipe name.
      required: true
      example: Morning V60
      selector:
        text:
