execute_recipe:
  name: Execute recipe
  description: >-
    Run a saved XBloom recipe, optionally overriding any top-level recipe
    scalar (grind size, RPM, dose, ratio, cup type, bypass) for this brew
    only — the stored recipe is unchanged. Overriding dose/ratio rescales
    the pour volumes proportionally to match the new total water.
    Selecting a recipe also syncs the Grind Size and Grinder RPM number
    entities to it.
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine(s) to brew on. Defaults to all configured machines.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    recipe:
      name: Recipe
      description: >-
        Which recipe to run — a local uid, a cloud table id, a share
        URL/id, or the exact recipe name. Defaults to the currently
        selected recipe if omitted.
      required: false
      example: Morning V60
      selector:
        text:
    dose_g:
      name: Dose
      description: >-
        Override the coffee dose in grams for this brew only. Pour volumes
        are rescaled to keep total water = dose × ratio.
      required: false
      example: 18
      selector:
        number:
          min: 1
          max: 100
          step: 0.5
          unit_of_measurement: g
          mode: box
    ratio:
      name: Water ratio
      description: >-
        Override the water ratio (total water = dose × ratio) for this
        brew only. Pour volumes are rescaled to match.
      required: false
      example: 16
      selector:
        number:
          min: 1
          max: 50
          step: 0.5
          mode: box
    cup_type:
      name: Cup type
      description: Override the cup/brewer type for this brew only.
      required: false
      selector:
        select:
          options:
            - x_pod
            - omni_dripper
            - other
            - tea
    grind_size:
      name: Grind size
      description: >-
        Override the grind size (0 = finest, 80 = coarsest) for this brew only.
      required: false
      example: 42
      selector:
        number:
          min: 1
          max: 80
          step: 1
          mode: slider
    rpm:
      name: Grinder RPM
      description: Override the grinder RPM for this brew only.
      required: false
      example: 90
      selector:
        number:
          min: 60
          max: 120
          step: 10
          mode: slider
    bypass_volume:
      name: Bypass volume
      description: >-
        Bypass water volume in ml added after the pours (0 = bypass off). Can
        be added even if the recipe has no bypass. Coffee recipes only.
      required: false
      example: 50
      selector:
        number:
          min: 0
          max: 200
          step: 5
          unit_of_measurement: mL
          mode: slider
    bypass_temperature:
      name: Bypass temperature
      description: >-
        Bypass water temperature in °C (0 = bypass off). Pair with a non-zero
        bypass volume. Coffee recipes only.
      required: false
      example: 90
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "°C"
          mode: slider

write_recipe_to_easy_slot:
  name: Write recipe to Easy Mode slot
  description: >-
    Store a recipe in one of the machine's three onboard Easy Mode slots
    (A/B/C) so it can be run from the machine's physical buttons. This
    does not brew anything; existing slot contents are overwritten. A
    share URL that isn't local yet is imported first. The slot's text
    entity updates to show the recipe name.
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine to write the slot on. Defaults to the first
        configured machine.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    slot:
      name: Slot
      description: Target Easy Mode slot.
      required: true
      selector:
        select:
          options:
            - A
            - B
            - C
    recipe:
      name: Recipe
      description: >-
        Which recipe to store — a local uid, a cloud table id, a share
        URL/id, or the exact recipe name. Defaults to the currently
        selected recipe if omitted.
      required: false
      example: Morning V60
      selector:
        text:

cloud_import_recipe:
  name: Import recipe from XBloom cloud
  description: >-
    Fetch a recipe from an XBloom cloud share URL or id and save it as a
    local recipe. No XBloom account login is required — this uses XBloom's
    public share endpoint, the same one the "Share" button in the official
    app produces a link for.
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine(s) to import the recipe into. Defaults to all
        configured machines.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    share_url:
      name: Share URL
      description: >-
        A share-h5.xbloom.com link (e.g. from the official app's Share
        button) or a collective.xbloom.com/recipe/{id} community-hub link.
        Provide this or recipe_id, not both.
      required: false
      example: "https://share-h5.xbloom.com/?id=KmMzhYCe5itq%2FJcqOLhiag%3D%3D"
      selector:
        text:
    recipe_id:
      name: Recipe ID
      description: >-
        The bare share id (the base64 value after ?id= in a share URL).
        Provide this or share_url, not both.
      required: false
      selector:
        text:

cloud_export_recipe:
  name: Export recipe to XBloom cloud
  description: >-
    Export a local recipe to the configured XBloom cloud account. With an
    account configured, the recipe is created on the account (or, if it
    was exported before, the same cloud recipe is updated in place) and
    the response includes its cloud id and share link. Without an
    account, nothing is uploaded — the response contains only the recipe
    definition.
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine whose recipe (and configured cloud account) to
        export from. Defaults to the first configured machine.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    recipe:
      name: Recipe
      description: >-
        Which recipe to export — a local uid, a cloud table id, a share
        URL/id, or the exact recipe name.
      required: true
      example: Morning V60
      selector:
        text:

list_recipes:
  name: List recipes
  description: >-
    List every local recipe (the ones shown in the Recipe dropdown),
    optionally filtered by name. Each result includes the recipe's local
    uid and, if it has been imported from / exported to the XBloom cloud,
    its cloud id and share URL.
  fields:
    device_id:
      name: Machine
      description: >-
        The XBloom machine whose recipes to list. Defaults to the first
        configured machine.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    query:
      name: Query
      description: >-
        Filter results to recipes whose name contains this text
        (case-insensitive). Omit to list every recipe.
      required: false
      example: Morning
      selector:
        text:

cloud_search_collective_recipes:
  name: Search XBloom collective recipes
  description: >-
    Search XBloom's public community recipe hub (collective.xbloom.com) —
    recipes shared by xBloom and other users. No XBloom account is
    required. The category filters are multi-select; besides the listed
    options you can type a raw code (or a display name) directly, which
    also covers categories added upstream after this list was snapshotted.
  fields:
    device_id:
      name: Machine
      description: >-
        Any configured XBloom machine (this search isn't tied to a specific
        machine or account). Defaults to the first configured machine.
      required: false
      selector:
        device:
          filter:
            - integration: xbloom
          multiple: true
    keyword:
      name: Keyword
      description: Free-text search across recipe names.
      required: false
      example: pour
      selector:
        text:
    category:
      name: Category
      description: Filter by coffee or tea.
      required: false
      selector:
        select:
          options:
            - coffee
            - tea
    src:
      name: Source
      description: >-
        official (xBloom-published) or user (community-submitted) recipes.
      required: false
      selector:
        select:
          options:
            - official
            - user
    machine:
      name: Machine model
      description: >-
        Machine model(s) to filter by. Multi-select; a raw code or display name can also be
        typed directly.
      required: false
      selector:
        select:
          multiple: true
          custom_value: true
          translation_key: collective_machine
          options:
            - "j15"
            - "j20"
    cup_type:
      name: Cup type
      description: >-
        Cup/brewer type(s) to filter by. Multi-select; a raw code or display name can also be
        typed directly.
      required: false
      selector:
        select:
          multiple: true
          custom_value: true
          translation_key: collective_cup_type
          options:
            - "1"
            - "2"
            - "3"
            - "4"
    origin:
