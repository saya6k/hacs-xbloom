# Prerelease (rc) track: drafts xbloom-vX.Y.Z-rc.N. With
# prerelease-identifier set, only the rc suffix increments between published
# prereleases, so shipping several rcs never consumes stable version numbers
# -- the stable track (release-drafter.yml) resolves from the last stable
# release only, and the -rc.N suffix keeps the two tracks' tags from
# colliding. Keep version-resolver/categories in sync with
# release-drafter.yml. No autolabeler here: the stable track's job handles
# PR labeling.
name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
prerelease: true
prerelease-identifier: "rc"
# Migrated off the deprecated `version-resolver.*.labels` / `categories[*].labels`
# fields (see https://github.com/release-drafter/release-drafter/pull/1558) -
# version-resolver entries (no `title`) drive the semver bump only and aren't
# shown in the release body; the titled entries below are the display
# categories, both keyed off `when.labels` now instead of a bare `labels` list.
categories:
  - type: "version-resolver"
    semver-increment: "minor"
    when:
      labels: ["enhancement", "feature"]
  - type: "version-resolver"
    semver-increment: "patch"
    when:
      labels: ["bug", "fix", "chore", "dependencies", "ci"]
  - type: "version-resolver"
    semver-increment: "patch"
  - title: "New Features"
    when:
      labels: ["enhancement", "feature"]
  - title: "Bug Fixes"
    when:
      labels: ["bug", "fix"]
  - title: "Maintenance"
    when:
      labels: ["chore", "dependencies", "ci"]
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
