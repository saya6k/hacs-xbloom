# Prerelease (rc) track: drafts xbloom-vX.Y.Z-rc.N. With
# prerelease-identifier set, only the rc suffix increments between published
# prereleases, so shipping several rcs never consumes stable version numbers
# -- the stable track (release-drafter.yml) resolves from the last stable
# release only, and the -rc.N suffix keeps the two tracks' tags from
# colliding. Keep version-resolver/categories in sync with
# release-drafter.yml. No autolabeler here: the stable track's job handles
# PR labeling.
name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
prerelease: true
prerelease-identifier: "rc"
version-resolver:
  minor:
    labels: ["enhancement", "feature"]
  patch:
    labels: ["bug", "fix", "chore", "dependencies", "ci"]
  default: patch
categories:
  - title: "New Features"
    labels: ["enhancement", "feature"]
  - title: "Bug Fixes"
    labels: ["bug", "fix"]
  - title: "Maintenance"
    labels: ["chore", "dependencies", "ci"]
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
