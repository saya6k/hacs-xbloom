name: Release Drafter

# Standalone (not a workflow_call reusable workflow, unlike validate.yml):
# needs its own pull_request_target trigger for autolabeling, which reusable
# workflows invoked only via `uses:` from ci.yml cannot receive.
# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  # Label PRs from their Conventional-Commit title so the version-resolver can
  # pick the bump (feat -> minor; fix/chore/ci -> patch). Without a PR trigger
  # the autolabeler never runs, so every release would default to patch. Uses
  # pull_request_target so labeling works for fork PRs too; release-drafter only
  # calls the API (no PR code is checked out).
  pull_request_target:
    types: [opened, reopened, synchronize, edited]
  workflow_dispatch:

concurrency:
  group: release-drafter-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Labels are mutated through the Issues API even for PRs — without this,
  # autolabeler's label-add calls 403 silently (no error surfaced in the
  # release-drafter log), so every PR ships unlabeled and every category
  # (New Features / Bug Fixes) falls through to the flat "What's Changed"
  # list instead of being grouped. Confirmed missing 2026-07-04: PRs #26-45
  # all merged with zero labels despite conventional-commit titles matching
  # the autolabeler regexes.
  issues: write

jobs:
  # No manifest.json sync here: the committed manifest stays at the latest
  # stable release, and release-zip.yml patches the authoritative version
  # into the zip asset at publish time (a push-based sync also cannot work
  # anymore -- main is protected and only accepts changes via PR).
  draft:
    name: Draft stable release
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  draft-prerelease:
    name: Draft prerelease (rc)
    # PR events are only for autolabeling, which the stable job already does.
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter-prerelease.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
