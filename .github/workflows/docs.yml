name: Docs

# Build + deploy the bilingual Zensical site to Pages. Runs only when a GitHub
# release is published — release-drafter maintains a single rolling draft, so
# a maintainer's manual publish is what deploys the docs. Checkout defaults to
# the released tag. Also dispatchable for manual re-deploys.
# yamllint disable-line rule:truthy
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  docs:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8

      - name: Install Zensical
        run: uv tool install zensical

      - name: Build English
        run: zensical build -f zensical.en.toml

      - name: Build Korean
        run: zensical build -f zensical.ko.toml

      - name: Write landing page (/ → /en/)
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./en/">
          <link rel="canonical" href="./en/">
          <title>Redirecting…</title>
          <body>
            <p>Redirecting to the <a href="./en/">English</a> site (<a href="./ko/">한국어</a>).</p>
          </body>
          </html>
          HTML

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v5
